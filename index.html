<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Currency Converter</title>
    <meta name="description" content="Real-time currency converter with 150+ world currencies, offline support, and historical charts." />

    <!-- PWA / theme -->
    <meta name="theme-color" content="#3b82f6" />
    <meta name="color-scheme" content="light dark" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Apple -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Currency" />
    <link rel="apple-touch-icon" href="/currency/apple-touch-icon-180x180.png" />

    <!-- Icons (vite-plugin-pwa will inject manifest link automatically) -->
    <link rel="icon" href="/currency/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/currency/pwa-icon.svg" sizes="any" type="image/svg+xml" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
