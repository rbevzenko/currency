<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>
    <linearGradient id="red" x1="256" y1="80" x2="256" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle glow ring -->
  <circle cx="256" cy="256" r="195" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.18"/>

  <!-- Dollar sign rendered as text; DejaVu Sans Bold ships on every Linux -->
  <text
    x="256" y="365"
    font-family="DejaVu Sans, Liberation Sans, Arial, Helvetica, sans-serif"
    font-size="330"
    font-weight="700"
    text-anchor="middle"
    fill="url(#red)"
  >$</text>
</svg>
